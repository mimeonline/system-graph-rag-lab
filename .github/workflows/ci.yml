name: CI

on:
  # Run CI for every PR to validate incoming changes before merge.
  pull_request:
  # Run CI on direct updates to main.
  push:
    branches:
      - main

jobs:
  web:
    name: Lint Test Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install
        # Lockfile must be in sync. Fails if dependencies drift.
        run: pnpm install --frozen-lockfile

      - name: Lint
        # Static code checks.
        run: pnpm lint

      - name: Typecheck
        # Type safety checks.
        run: pnpm typecheck

      - name: Test
        # Unit and integration tests.
        run: pnpm test

      - name: Build
        # Production build verification.
        run: pnpm build

      - name: Security audit advisory
        # Advisory only. Keeps CI green while still exposing high-risk packages.
        run: pnpm audit --prod --audit-level high || true
