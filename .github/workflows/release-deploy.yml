name: release-deploy

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag, e.g. 1.0.0"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  release:
    name: Build And Push
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Derive image tag
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME#v}"
          else
            TAG="${{ inputs.image_tag }}"
          fi
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using image tag: $TAG"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          docker build -f Dockerfile -t ghcr.io/mimeonline/system-graph-rag-lab:${IMAGE_TAG} .

      - name: Push image
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          docker push ghcr.io/mimeonline/system-graph-rag-lab:${IMAGE_TAG}

  deploy_prod:
    name: Deploy Production
    needs: release
    uses: ./.github/workflows/deploy-prod.yml
    with:
      image_tag: ${{ needs.release.outputs.image_tag }}
    secrets: inherit
