name: release-deploy

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag, e.g. 1.0.0"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build And Push
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Derive image tag
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME#v}"
          else
            TAG="${{ inputs.image_tag }}"
          fi
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using image tag: $TAG"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          docker build -f Dockerfile -t ghcr.io/mimeonline/system-graph-rag-lab:${IMAGE_TAG} .

      - name: Push image
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          docker push ghcr.io/mimeonline/system-graph-rag-lab:${IMAGE_TAG}

  deploy_prod:
    name: Deploy Production
    needs: release
    uses: ./.github/workflows/deploy-prod.yml
    with:
      image_tag: ${{ needs.release.outputs.image_tag }}
    secrets: inherit

  github_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - release
      - deploy_prod
    if: ${{ github.ref_type == 'tag' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract release notes from changelog
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          TITLE="system-graph-rag-lab ${VERSION}"
          NOTES_FILE="$(mktemp)"

          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\] - " { capture=1; next }
            capture && $0 ~ "^## " { exit }
            capture { print }
          ' CHANGELOG.md > "$NOTES_FILE"

          if [[ ! -s "$NOTES_FILE" ]]; then
            {
              echo "## Highlights"
              echo
              echo "- Release ${VERSION}"
            } > "$NOTES_FILE"
          fi

          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TITLE: ${{ steps.notes.outputs.title }}
          RELEASE_NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "${RELEASE_TITLE}" \
              --notes-file "${RELEASE_NOTES_FILE}"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${RELEASE_TITLE}" \
              --notes-file "${RELEASE_NOTES_FILE}"
          fi
