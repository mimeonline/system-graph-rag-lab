      <text x="16" y="27" font-family="Inter, Arial, sans-serif" font-size="24" fill="#23395f">1. Begriffe definieren</text>
    </g>
    <g transform="translate(24 150)">
      <rect width="492" height="38" rx="8" fill="#d1d8e1" stroke="#6fa8ff" />
      <text x="16" y="27" font-family="Inter, Arial, sans-serif" font-size="24" fill="#23395f">2. Beziehungen typisieren</text>
    </g>
    <g transform="translate(24 216)">
      <rect width="492" height="38" rx="8" fill="#d1d8e1" stroke="#6fa8ff" />
      <text x="16" y="27" font-family="Inter, Arial, sans-serif" font-size="24" fill="#23395f">3. Belegpfad zuordnen</text>
    </g>
    <g transform="translate(24 282)">
      <rect width="492" height="38" rx="8" fill="#d1d8e1" stroke="#6fa8ff" />
      <text x="16" y="27" font-family="Inter, Arial, sans-serif" font-size="24" fill="#23395f">4. Ableitung versionieren</text>
    </g>
    <g transform="translate(24 348)">
      <rect width="492" height="38" rx="8" fill="#d1d8e1" stroke="#6fa8ff" />
      <text x="16" y="27" font-family="Inter, Arial, sans-serif" font-size="24" fill="#23395f">5. Review durchführen</text>
