<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b234d" />
      <stop offset="1" stop-color="#0f2f67" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#173566" stop-opacity="0.95" />
      <stop offset="1" stop-color="#1d3f78" stop-opacity="0.92" />
    </linearGradient>
  </defs>

  <rect width="1400" height="860" fill="url(#bg)" />

  <text x="80" y="86" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="800" fill="#e2ecf8">
    <tspan x="80" dy="0">Von plausiblen Antworten</tspan>
    <tspan x="80" dy="74">zu prüfbaren Entscheidungen</tspan>
  </text>
  <text x="80" y="206" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="500" fill="#adbed8">
    Vom Texturteil zum nachvollziehbaren Entscheidungsmodell
  </text>

  <g transform="translate(80 260)">
    <rect width="620" height="500" rx="22" fill="url(#panel)" stroke="#4d77b8" stroke-width="2" />
    <text x="24" y="58" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="700" fill="#d2dff1">Plausibel</text>
    <text x="24" y="122" font-family="Inter, Arial, sans-serif" font-size="46" fill="#adbed8">• Gute Formulierung</text>
    <text x="24" y="185" font-family="Inter, Arial, sans-serif" font-size="46" fill="#adbed8">• Quellen als Liste</text>
    <text x="24" y="248" font-family="Inter, Arial, sans-serif" font-size="46" fill="#adbed8">• Implizite Annahmen</text>
    <text x="24" y="311" font-family="Inter, Arial, sans-serif" font-size="46" fill="#adbed8">• Unklare Gewichtung</text>
    <text x="24" y="374" font-family="Inter, Arial, sans-serif" font-size="46" fill="#adbed8">• Instabil bei Nachfragen</text>
  </g>

  <g transform="translate(780 260)">
