<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="860" fill="#F8FAFC"/>
  <text x="80" y="90" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="700" fill="#0F172A">Decision Readiness Matrix</text>
  <text x="80" y="132" font-family="Inter, Arial, sans-serif" font-size="24" fill="#475569">Which level of structural quality is needed for which kind of decision</text>

  <rect x="180" y="200" width="1040" height="560" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="520" y1="220" x2="520" y2="740" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="860" y1="220" x2="860" y2="740" stroke="#E2E8F0" stroke-width="2"/>

  <line x1="200" y1="380" x2="1200" y2="380" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="200" y1="560" x2="1200" y2="560" stroke="#E2E8F0" stroke-width="2"/>

  <text x="350" y="250" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#334155">Low context complexity</text>
  <text x="690" y="250" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#334155">Medium context complexity</text>
  <text x="1030" y="250" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#334155">High context complexity</text>

  <text x="42" y="520" transform="rotate(-90 42 520)" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" fill="#334155">Decision impact</text>

  <rect x="240" y="300" width="220" height="70" rx="12" fill="#ECFDF5" stroke="#86EFAC"/>
  <text x="350" y="343" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#14532D">FAQ, quick decision</text>

  <rect x="580" y="300" width="220" height="70" rx="12" fill="#EFF6FF" stroke="#93C5FD"/>
  <text x="690" y="343" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#1E3A8A">RAG + sources</text>

  <rect x="920" y="300" width="220" height="70" rx="12" fill="#DBEAFE" stroke="#60A5FA"/>
  <text x="1030" y="343" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#1E3A8A">GraphRAG recommended</text>

  <rect x="580" y="480" width="220" height="70" rx="12" fill="#DBEAFE" stroke="#60A5FA"/>
  <text x="690" y="523" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#1E3A8A">GraphRAG useful</text>

  <rect x="920" y="480" width="220" height="70" rx="12" fill="#BFDBFE" stroke="#3B82F6"/>
  <text x="1030" y="523" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#1E3A8A">GraphRAG necessary</text>

  <rect x="920" y="660" width="220" height="70" rx="12" fill="#93C5FD" stroke="#2563EB"/>
  <text x="1030" y="703" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#1E3A8A">Governance required</text>

  <text x="220" y="790" font-family="Inter, Arial, sans-serif" font-size="20" fill="#64748B">The higher the impact and complexity, the more important explicit concepts, evidence, and paths become.</text>
</svg>
