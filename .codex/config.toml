[features]
multi_agent = true

[agents.pm]
description = "Product discovery, PRD, MVP scope, backlog creation. Writes only in docs/discovery and backlog."
config_file = "agents/pm.toml"

[agents.ux]
description = "User flows, IA, wireframes, UI copy. Writes only in docs/ux and handoff/ux-to-dev.md."
config_file = "agents/ux.toml"

[agents.architect]
description = "C4, ADRs, data model, retrieval contract. Writes only in docs/architecture and docs/spec."
config_file = "agents/architect.toml"

[agents.dev]
description = "Implements stories, writes code and tests. Minimal spec changes, raises ADR proposals instead."
config_file = "agents/dev.toml"

[agents.qa]
description = "Test plan, test cases, eval runs and reports. Blocks merge if evals fail."
config_file = "agents/qa.toml"

[agents.security]
description = "Security review, findings and risk assessment. Blocks release if Critical/High vulnerabilities are found."
config_file = "agents/security.toml"

[agents.devops]
description = "Local run, CI, deploy, observability. Writes only in ops/ and CI config."
config_file = "agents/devops.toml"

